# Jekyll config for the LogDx-CI GitHub Pages site.
#
# Enable in repo settings: Settings → Pages → Source = "Deploy from
# a branch" → Branch = main, Folder = /docs.

title: "LogDx-CI"
description: "A benchmark for CI log reduction tools — do they preserve enough evidence for LLM root-cause diagnosis?"
remote_theme: pages-themes/cayman@v0.2.0
plugins:
  - jekyll-remote-theme
  - jekyll-relative-links
  - jekyll-seo-tag

# Make Jekyll auto-render every .md as a cayman-themed page (default
# theme already does this, but make it explicit).
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"

# Treat relative .md links in markdown as page links (so README-style
# cross-links work in the rendered site).
relative_links:
  enabled: true
  collections: true

# Exclude internal scratch / non-public files from the build.
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - node_modules
  - "*.tmp"

# Per the 2026-06-22 release decision: site lives at
# logdx-bench.github.io (org root), code stays at
# github.com/eyuansu62/LogDx (personal). The `repository` field
# below still points at the code repo for GitHub-Pages-flavored
# "edit on GitHub" links.
url: "https://logdx-bench.github.io"
baseurl: ""
repository: "eyuansu62/LogDx"

# SEO tag plugin uses these.
author: "Bowen Qin"
twitter:
  card: summary_large_image
social:
  links:
    - https://github.com/eyuansu62/LogDx
    - https://huggingface.co/datasets/eyuansu71/logdx-ci
